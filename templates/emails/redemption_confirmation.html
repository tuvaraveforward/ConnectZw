<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .container {
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .header {
            background-color: #3182ce;
            color: white;
            padding: 10px;
            text-align: center;
            border-radius: 10px 10px 0 0;
        }

        .content {
            padding: 20px;
        }

        .footer {
            text-align: center;
            font-size: 0.8em;
            color: #777;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Redemption Successful</h1>
        </div>
        <div class="content">
            <p>Dear {{ client.firstname }},</p>
            <p>Your coupon has been successfully redeemed.</p>
            <p><strong>Coupon ID:</strong> {{ coupon_id }}</p>
            <p><strong>Items Processed:</strong> {{ items_count }}</p>
            <p>Thank you for using our service!</p>
            <p>Regards,<br>ConnectZw Team</p>
        </div>
        <div class="footer">
            <p>&copy; 2025 CONNECTZW. All rights reserved.</p>
        </div>
    </div>
</body>

</html>

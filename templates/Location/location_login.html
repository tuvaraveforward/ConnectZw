{% extends "base.html" %}
{% load static %}

{% block title %}Location Login{% endblock %}

{% block content %}
<div class="login-card">
    <div class="login-header">
        <img src="{% static 'images/icon.png' %}" alt="ConnectZw Logo" class="login-logo">
        <h1>Location Login</h1>
        <p>Sign in to manage your location</p>
    </div>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="message-item {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="">
        {% csrf_token %}
        <div class="form-group">
            <label for="account_name">Account Name</label>
            <input type="text" id="account_name" name="username" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="submit-btn">Login</button>
    </form>
</div>
{% endblock %}

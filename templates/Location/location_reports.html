{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Location - Reports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 220px;
            background-color: #fff;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            padding-top: 1rem;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .sidebar a {
            color: #333;
            padding: 1rem 1.5rem;
            text-decoration: none;
            font-size: 1rem;
            transition: background-color 0.3s ease;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: #007bff;
            color: white;
        }

        .content {
            flex-grow: 1;
            padding: 2rem;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 1200px;
            margin-top: 2rem;
            margin-bottom: 2rem;
            margin-left: 2rem;
        }

        .logout-link {
            margin-top: auto;
            padding: 1rem 1.5rem;
            background-color: #dc3545;
            color: white !important;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
        }

        .logout-link:hover {
            background-color: #c82333;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #ddd;
            margin-bottom: 2rem;
        }

        .header h2 {
            margin: 0;
            color: #333;
        }

        .section {
            margin-bottom: 2rem;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .section h3 {
            margin-bottom: 1rem;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            font-weight: bold;
        }

        input,
        select,
        button {
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .form-row>div {
            flex: 1;
            min-width: 200px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <img src="{% static 'images/icon.png' %}" alt="System Logo"
            style="width: 200px; height: auto; align-self: center; margin-bottom: 20px;">

        <a href="{% url 'location_dashboard' %}" class="active"><i class="fa-solid fa-tachometer-alt"></i> DASHBOARD</a>
        <a href="{% url 'location_sales' %}"><i class="fa-solid fa-chart-line"></i> SALES</a>
        <a href="{% url 'location_reports' %}"><i class="fa-solid fa-file-invoice-dollar"></i> REPORTS</a>
        <a href="{% url 'location_feedback' %}"><i class="fa-solid fa-comment-dots"></i> FEEDBACK</a>
        <a href="{% url 'location_settings' %}"><i class="fa-solid fa-gear"></i> SETTINGS</a>
        <a href="{% url 'location_about' %}"><i class="fa-solid fa-circle-info"></i> ABOUT</a>
        <a href="{% url 'location_login' %}" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i>
            LOGOUT</a>
    </div>
    <div class="content">
        <div class="header">
            <h2>Reports for Location: {{ location.location_name }}</h2>
        </div>

        <div class="section">
            <h3>Generate Transaction Report</h3>
            <form method="post">
                {% csrf_token %}
                <div class="form-row">
                    <div>
                        <label for="{{ form.client.id_for_label }}">Client:</label>
                        {{ form.client }}
                    </div>
                </div>
                <div class="form-row">
                    <div>
                        <label for="{{ form.start_date.id_for_label }}">Start Date:</label>
                        {{ form.start_date }}
                    </div>
                    <div>
                        <label for="{{ form.end_date.id_for_label }}">End Date:</label>
                        {{ form.end_date }}
                    </div>
                    <div>
                        <label for="{{ form.email.id_for_label }}">Email Address:</label>
                        {{ form.email }}
                    </div>
                </div>
                <button type="submit">Generate and Send Report</button>
            </form>
        </div>
    </div>
</body>

</html>

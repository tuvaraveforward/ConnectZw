{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Run Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input[type="date"],
        input[type="time"] {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.7rem;
            background-color: #007bff;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <img src="{% static 'images/icon.png' %}" alt="System Logo"
        style="position: absolute; top: 10px; left: 10px; width: 200px; height: auto; z-index: 1000;">
    <div class="form-container">
        <h2>Run Report</h2>
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}" {% endif %}>{{ message.message }}</li>
                {% endfor %}
        </ul>
        {% endif %}
        <form method="POST" action="">
            {% csrf_token %}
            <label for="start_date">Start Date</label>
            <input type="date" id="start_date" name="start_date" required />

            <label for="start_time">Start Time</label>
            <input type="time" id="start_time" name="start_time" required />

            <label for="end_date">End Date</label>
            <input type="date" id="end_date" name="end_date" required />

            <label for="end_time">End Time</label>
            <input type="time" id="end_time" name="end_time" required />

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required />

            <button type="submit" class="submit-button">Generate and Send Report</button>
        </form>
    </div>
</body>

</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Report Coupon</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
        }

        button {
            padding: 0.7rem 1.5rem;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
            margin: 0 0.5rem;
        }

        .submit-button {
            background-color: #007bff;
        }

        .submit-button:hover {
            background-color: #0056b3;
        }

        .cancel-button {
            background-color: #6c757d;
        }

        .cancel-button:hover {
            background-color: #545b62;
        }
    </style>
</head>

<body>
    <img src="{% static 'images/icon.png' %}" alt="System Logo"
        style="position: absolute; top: 10px; left: 10px; width: 200px; height: auto; z-index: 1000;">
    <div class="form-container">
        <h2>Report Coupon</h2>
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}" {% endif %}>{{ message.message }}</li>
                {% endfor %}
        </ul>
        {% endif %}
        <form method="POST" action="">
            {% csrf_token %}
            <label for="coupon_number">Coupon Number</label>
            <input type="text" id="coupon_number" name="coupon_number" required />

            <label for="reason">Reason</label>
            <textarea id="reason" name="reason" required></textarea>

            <div class="button-container">
                <button type="submit" class="submit-button">Report Coupon</button>
                <a href="{% url 'pos_dashboard' %}" class="cancel-button"
                    style="display: inline-block; text-align: center; text-decoration: none; padding: 0.7rem 1.5rem;">Cancel</a>
            </div>
        </form>
    </div>
    <script>
        // Assuming 'x' is defined elsewhere or intended to be defined.
        // This script block is added to make the provided JavaScript line syntactically correct within the HTML.
        // If 'x' is not defined, this line will cause a runtime error.
        setTimeout(function () { /* if (typeof x !== 'undefined') { */ /* x.className = x.className.replace("show", ""); */ /* } */ }, 3000);
    </script>
</body>

</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>POS Settings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 220px;
            background-color: #fff;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            padding-top: 1rem;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .sidebar a {
            color: #333;
            padding: 1rem 1.5rem;
            text-decoration: none;
            font-size: 1rem;
            transition: background-color 0.3s ease;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: #007bff;
            color: white;
        }

        .content {
            flex-grow: 1;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid #ddd;
            margin-bottom: 2rem;
        }

        .header h1 {
            margin: 0;
        }

        .logout-link {
            margin-top: auto;
            padding: 1rem 1.5rem;
            background-color: #dc3545;
            color: white !important;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
        }

        .logout-link:hover {
            background-color: #c82333;
        }

        .settings-content {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .reset-password-btn {
            padding: 1rem 2rem;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .reset-password-btn:hover {
            background-color: #218838;
        }
    </style>
</head>

<body>
    
    <div class="sidebar">
        <img src="{% static 'images/icon.png' %}" alt="System Logo" style="width: 100px; height: auto; align-self: center; margin-bottom: 20px;">
        <h2>POS Terminal</h2>
        <a href="{% url 'pos_dashboard' %}">Dashboard</a>
        <a href="{% url 'redeem_coupon' %}">Redeem Coupon</a>
        <a href="{% url 'pos_check_validity' %}">Check Validity</a>
        <a href="{% url 'pos_run_report' %}">Run Report</a>
        <a href="{% url 'pos_report_coupon' %}">Report Coupon</a>
        <a href="{% url 'pos_settings' %}" class="active">Settings</a>
        <a href="{% url 'pos_login' %}" class="logout-link">Logout</a>
    </div>
    <div class="content">
        <div class="header">
            <h1>Settings</h1>
        </div>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}" {% endif %}>{{ message.message }}</li>
                {% endfor %}
        </ul>
        {% endif %}

        <div class="settings-content">
            <h2>POS Settings</h2>
            <p>Manage your POS terminal settings here.</p>
            <button class="reset-password-btn">Reset Password</button>
        </div>
    </div>
</body>

</html>

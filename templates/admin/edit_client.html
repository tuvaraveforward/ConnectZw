{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit Client</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: hsla(80, 27%, 98%, 1.00);
            margin: 0;
            height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 220px;
            background-color: hsla(80, 27%, 98%, 1.00);
            color: hsla(80, 27%, 98%, 1.00);
            display: flex;
            flex-direction: column;
            padding-top: 1rem;
            position: fixed;
            height: 100vh;
            color: #333;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            font-family: Algerian;
        }

        .sidebar a {
            color: #333;
            padding: 1rem 1.5rem;
            text-decoration: none;
            font-size: 1rem;
            transition: background-color 0.3s ease;
        }

        .sidebar a:hover {
            background-color: #495057;
        }

        .sidebar a.active {
            background-color: #007bff;
        }

        .content {
            margin-left: 220px;
            padding: 2rem;
            flex-grow: 1;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #ddd;
            margin-bottom: 2rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"] {
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .btn-save {
            padding: 0.75rem 1.5rem;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        .btn-save:hover {
            background-color: #218838;
        }

        .btn-cancel {
            padding: 0.75rem 1.5rem;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-cancel:hover {
            background-color: #5a6268;
        }

        .btn-delete {
            padding: 0.75rem 1.5rem;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-left: 0.5rem;
        }

        .btn-delete:hover {
            background-color: #c82333;
        }

        .logout-link {
            margin-top: auto;
            padding: 1rem 1.5rem;
            background-color: #dc3545;
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border-top: 1px solid #495057;
        }

        .logout-link:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body>
    
    <div class="sidebar">
        <img src="{% static 'images/icon.png' %}" alt="System Logo" style="width: 100px; height: auto; align-self: center; margin-bottom: 20px;">

        <a href="{% url 'admin_dashboard' %}">Dashboard</a>
        <a href="{% url 'locations' %}">LOCATIONS</a>
        <a href="{% url 'accounts' %}">ACCOUNTS</a>
        <a href="{% url 'sales' %}">SALES</a>
        <a href="{% url 'settings' %}">SETTINGS</a>
        <a href="{% url 'reports' %}">REPORTS</a>
        <a href="{% url 'admin_login' %}" class="logout-link">Logout</a>
    </div>
    <div class="content">
        <div class="header">
            <h2>Edit Client</h2>
        </div>

        <form method="post">
            {% csrf_token %}
            <label for="id_username">Username:</label>
            <input type="text" id="id_username" name="username" value="{{ form.username.value }}" required>

            <label for="id_firstname">First Name:</label>
            <input type="text" id="id_firstname" name="firstname" value="{{ form.firstname.value }}" required>

            <label for="id_lastname">Last Name:</label>
            <input type="text" id="id_lastname" name="lastname" value="{{ form.lastname.value }}" required>

            <label for="id_email_address">Email:</label>
            <input type="email" id="id_email_address" name="email_address" value="{{ form.email_address.value }}"
                required>

            <label for="id_phone_number">Phone:</label>
            <input type="tel" id="id_phone_number" name="phone_number" value="{{ form.phone_number.value }}" required>

            <div class="checkbox-container">
                <input type="checkbox" id="id_is_active" name="is_active" checked>
                <label for="id_is_active">Active</label>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="window.history.back()">Cancel</button>
                <button type="button" class="btn-delete" id="btn-delete-client">Delete Client</button>
                <button type="submit" class="btn-save">Save Changes</button>
            </div>
        </form>

        <!-- Hidden delete form to avoid nested forms (submitted via JS) -->
        <form method="post" action="{% url 'delete_client' client.id %}" id="delete-client-form" style="display:none;">
            {% csrf_token %}
        </form>
        </form>
    </div>
</body>

</html>
<script>
    // Submit hidden delete form when Delete Client is clicked
    (function () {
        var btn = document.getElementById('btn-delete-client');
        if (btn) {
            btn.addEventListener('click', function () {
                if (confirm('Are you sure you want to delete this client? This action cannot be undone.')) {
                    document.getElementById('delete-client-form').submit();
                }
            });
        }
    })();
</script>

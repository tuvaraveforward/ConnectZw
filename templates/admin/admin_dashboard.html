{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: hsla(80, 27%, 98%, 1.00);
            margin: 0;
            height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 220px;
            background-color: hsla(80, 27%, 98%, 1.00);
            color: hsla(80, 27%, 98%, 1.00);
            display: flex;
            flex-direction: column;
            padding-top: 1rem;
            position: fixed;
            height: 100vh;
            /* text color is set via the color property on links */
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            font-family: Algerian;
        }

        .sidebar a {
            color: #333;
            padding: 1rem 1.5rem;
            text-decoration: none;
            font-size: 1rem;
            transition: background-color 0.3s ease;
        }



        .sidebar a:hover {
            background-color: #495057;
        }

        .sidebar a i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }

        .sidebar a.active {
            background-color: #007bff;
        }

        .content {
            margin-left: 220px;
            padding: 2rem;
            flex-grow: 1;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 900px;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .circles {
            display: grid;
            grid-template-columns: repeat(2, 100px);
            grid-template-rows: repeat(2, 100px);
            gap: 10px;
            justify-content: center;
            margin: 2rem 0;
            position: relative;
            width: 220px;
        }

        .circle {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .circle:nth-child(1) {
            background-color: red;
            z-index: 3;
            grid-column: 1;
            grid-row: 1;
        }

        .circle:nth-child(2) {
            background-color: blue;
            z-index: 2;
            grid-column: 2;
            grid-row: 1;
            margin-left: -30px;
        }

        .circle:nth-child(3) {
            background-color: green;
            z-index: 2;
            grid-column: 1;
            grid-row: 2;
            margin-top: -30px;
        }

        .circle:nth-child(4) {
            background-color: yellow;
            z-index: 1;
            grid-column: 2;
            grid-row: 2;
            margin-left: -30px;
            margin-top: -30px;
        }

        .logout-link {
            margin-top: auto;
            padding: 1rem 1.5rem;
            background-color: #dc3545;
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border-top: 1px solid #495057;
        }

        .logout-link:hover {
            background-color: #c82333;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #ddd;
            margin-bottom: 2rem;
        }

        .search-container {
            display: flex;
            align-items: center;
        }

        .search-container input {
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 0.5rem;
        }

        .search-container button {
            padding: 0.5rem 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .search-container button:hover {
            background-color: #0056b3;
        }

        .reset-password {
            padding: 0.5rem 1rem;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .reset-password:hover {
            background-color: #218838;
        }

        h2.content-title {
            margin-bottom: 1.5rem;
        }

        p {
            margin-bottom: 1rem;
        }

        .charts-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .chart-section {
            flex: 1;
            text-align: center;
        }

        .chart-section svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <img src="{% static 'images/icon.png' %}" alt="System Logo"
            style="width: 200px; height: max-content; align-self: center; margin-bottom: 20px;">

        <a href="{% url 'admin_dashboard' %}" class="active"><i class="fa-solid fa-tachometer-alt"></i> DASHBOARD</a>
        <a href="{% url 'locations' %}"><i class="fa-solid fa-map-location-dot"></i> LOCATIONS</a>
        <a href="{% url 'accounts' %}"><i class="fa-solid fa-users"></i> ACCOUNTS</a>
        <a href="{% url 'sales' %}"><i class="fa-solid fa-chart-line"></i> SALES</a>
        <a href="{% url 'settings' %}"><i class="fa-solid fa-gear"></i> SETTINGS</a>
        <a href="{% url 'reports' %}"><i class="fa-solid fa-file-invoice-dollar"></i> REPORTS</a>
        <a href="{% url 'admin_feedbacks' %}"><i class="fa-solid fa-comment-dots"></i> FEEDBACKS</a>
        <a href="{% url 'admin_login' %}" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>
    <div class="content">
        <div class="header">
            <div class="search-container">
                <input type="text" placeholder="Search...">
                <button type="submit">Search</button>
            </div>
            <a href="{% url 'admin_reset_password' %}" class="reset-password">Reset Password</a>
        </div>

        <div class="charts-container">
            <div class="chart-section">
                <h2>Continent Sales</h2>
                <svg width="350" height="350" viewBox="0 0 400 400">
                    <!-- Pie chart with 5cm radius (189px) -->
                    <g transform="translate(200,200)">
                        <!-- Africa (Red) -->
                        <path d="M 0 0 L 0 -189 A 189 189 0 0 1 189 0 Z" fill="#FF6B6B" stroke="#fff"
                            stroke-width="2" />
                        <text x="70" y="-100" text-anchor="middle" fill="#fff" font-size="16"
                            font-weight="bold">Africa</text>

                        <!-- Asia (Blue) -->
                        <path d="M 0 0 L 189 0 A 189 189 0 0 1 0 189 Z" fill="#4ECDC4" stroke="#fff" stroke-width="2" />
                        <text x="100" y="50" text-anchor="middle" fill="#fff" font-size="16"
                            font-weight="bold">Asia</text>

                        <!-- Europe (Green) -->
                        <path d="M 0 0 L 0 189 A 189 189 0 0 1 -189 0 Z" fill="#45B7D1" stroke="#fff"
                            stroke-width="2" />
                        <text x="-100" y="50" text-anchor="middle" fill="#fff" font-size="16"
                            font-weight="bold">Europe</text>

                        <!-- Americas (Yellow) -->
                        <path d="M 0 0 L -189 0 A 189 189 0 0 1 0 -189 Z" fill="#FFA07A" stroke="#fff"
                            stroke-width="2" />
                        <text x="-70" y="-100" text-anchor="middle" fill="#fff" font-size="16"
                            font-weight="bold">Americas</text>
                    </g>
                </svg>
            </div>

            <div class="chart-section">
                <h2>Product Sales</h2>
                <svg width="350" height="350" viewBox="0 0 400 400">
                    <!-- Pie chart with 5cm radius (189px) for Product Sales -->
                    <g transform="translate(200,200)">
                        <!-- Building Materials -->
                        <path d="M 0 0 L 0.00 -189.00 A 189 189 0 0 1 68.27 -176.24 Z" fill="#FF6B6B" stroke="#fff"
                            stroke-width="1" />
                        <text x="26.05" y="-139.34" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Building Materials</text>

                        <!-- Electronics -->
                        <path d="M 0 0 L 68.27 -176.24 A 189 189 0 0 1 127.33 -139.67 Z" fill="#4ECDC4" stroke="#fff"
                            stroke-width="1" />
                        <text x="74.62" y="-120.52" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Electronics</text>

                        <!-- Furniture -->
                        <path d="M 0 0 L 127.33 -139.67 A 189 189 0 0 1 169.19 -84.24 Z" fill="#45B7D1" stroke="#fff"
                            stroke-width="1" />
                        <text x="113.12" y="-85.42" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Furniture</text>

                        <!-- Groceries -->
                        <path d="M 0 0 L 169.19 -84.24 A 189 189 0 0 1 188.19 -17.44 Z" fill="#FFA07A" stroke="#fff"
                            stroke-width="1" />
                        <text x="136.34" y="-38.79" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Groceries</text>

                        <!-- Clothing -->
                        <path d="M 0 0 L 188.19 -17.44 A 189 189 0 0 1 181.79 51.72 Z" fill="#98D8C8" stroke="#fff"
                            stroke-width="1" />
                        <text x="141.15" y="13.08" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Clothing</text>

                        <!-- Automotive -->
                        <path d="M 0 0 L 181.79 51.72 A 189 189 0 0 1 150.83 113.90 Z" fill="#F7DC6F" stroke="#fff"
                            stroke-width="1" />
                        <text x="126.89" y="63.18" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Automotive</text>

                        <!-- Sports -->
                        <path d="M 0 0 L 150.83 113.90 A 189 189 0 0 1 99.50 160.69 Z" fill="#BB8FCE" stroke="#fff"
                            stroke-width="1" />
                        <text x="95.50" y="104.75" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Sports</text>

                        <!-- Life Assurance & Fees -->
                        <path d="M 0 0 L 99.50 160.69 A 189 189 0 0 1 34.73 185.78 Z" fill="#85C1E9" stroke="#fff"
                            stroke-width="1" />
                        <text x="51.21" y="132.18" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Life Assurance & Fees</text>

                        <!-- Health & Beauty -->
                        <path d="M 0 0 L 34.73 185.78 A 189 189 0 0 1 -34.73 185.78 Z" fill="#F8C471" stroke="#fff"
                            stroke-width="1" />
                        <text x="0.00" y="141.75" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Health & Beauty</text>

                        <!-- Books -->
                        <path d="M 0 0 L -34.73 185.78 A 189 189 0 0 1 -99.50 160.69 Z" fill="#82E0AA" stroke="#fff"
                            stroke-width="1" />
                        <text x="-51.21" y="132.18" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Books</text>

                        <!-- Oil & Gas -->
                        <path d="M 0 0 L -99.50 160.69 A 189 189 0 0 1 -150.83 113.90 Z" fill="#D98880" stroke="#fff"
                            stroke-width="1" />
                        <text x="-95.50" y="104.75" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Oil & Gas</text>

                        <!-- Jewelry -->
                        <path d="M 0 0 L -150.83 113.90 A 189 189 0 0 1 -181.79 51.72 Z" fill="#C39BD3" stroke="#fff"
                            stroke-width="1" />
                        <text x="-126.89" y="63.18" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Jewelry</text>

                        <!-- Agriculture Supplies -->
                        <path d="M 0 0 L -181.79 51.72 A 189 189 0 0 1 -188.19 -17.44 Z" fill="#7FB3D5" stroke="#fff"
                            stroke-width="1" />
                        <text x="-141.15" y="13.08" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Agriculture Supplies</text>

                        <!-- Office Supplies -->
                        <path d="M 0 0 L -188.19 -17.44 A 189 189 0 0 1 -169.19 -84.24 Z" fill="#76D7C4" stroke="#fff"
                            stroke-width="1" />
                        <text x="-136.34" y="-38.79" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Office Supplies</text>

                        <!-- Residential stands -->
                        <path d="M 0 0 L -169.19 -84.24 A 189 189 0 0 1 -127.33 -139.67 Z" fill="#F1948A" stroke="#fff"
                            stroke-width="1" />
                        <text x="-113.12" y="-85.42" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Residential stands</text>

                        <!-- Music Instruments -->
                        <path d="M 0 0 L -127.33 -139.67 A 189 189 0 0 1 -68.27 -176.24 Z" fill="#85929E" stroke="#fff"
                            stroke-width="1" />
                        <text x="-74.62" y="-120.52" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Music Instruments</text>

                        <!-- Kitchen Appliances -->
                        <path d="M 0 0 L -68.27 -176.24 A 189 189 0 0 1 0.00 -189.00 Z" fill="#E59866" stroke="#fff"
                            stroke-width="1" />
                        <text x="-26.05" y="-139.34" text-anchor="middle" fill="#0e0c0cff" font-size="9"
                            font-weight="bold">Kitchen Appliances</text>
                    </g>
                </svg>
            </div>
        </div>

        <div id="datetime" style="position: fixed; bottom: 10px; right: 10px; font-size: 1em; color: #333;"></div>
    </div>
    <div style="position: fixed; top: 10px; left: 10px; font-size: 1.5em; color: #333;">
        Welcome, {{ username }}
    </div>
    <script>
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        function updateDateTime() {
            const now = new Date();
            const day = days[now.getDay()];
            const date = now.getDate();
            const month = months[now.getMonth()];
            const year = now.getFullYear();
            const time = now.toLocaleTimeString('en-GB');
            document.getElementById('datetime').textContent = `${day}, ${date} ${month} ${year} ${time}`;
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>
</body>

</html>

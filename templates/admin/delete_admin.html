{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Delete Admin</title>
</head>
<body>
    <h2>Delete Admin: {{ admin_obj.username }}</h2>
    <p>Are you sure you want to delete this admin user?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a href="{% url 'settings' %}">Cancel</a>
    </form>
</body>
</html>

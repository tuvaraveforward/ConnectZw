{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Confirm Delete</title>
</head>
<body>
    <h2>Delete Product: {{ product.name }}</h2>
    <p>Are you sure you want to delete this product?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a href="{% url 'dealer_settings' %}">Cancel</a>
    </form>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ConnectZw</title>
    <style>
        /* Dashboard-derived styles (trimmed for login) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .shell {
            display: flex;
            border-radius: 10px;
            overflow: hidden;
            border: 0.5px solid #1e3a5f;
            background: #f4f6f9;
            min-height: 480px;
            width: 900px;
            margin: 40px auto;
        }

        .sidebar {
            width: 320px;
            background: #0f2744;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 18px;
        }

        .logo-lockup {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            min-width: 64px;
            background: #0d5c46;
            border-radius: 12px;
            display: flex;
            align-items: center;
        }

        .login-card {
            width: 420px;
            padding: 28px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, .08);
        }

        .login-logo {
            width: 96px;
            height: 96px;
            display: block;
            margin: 0 auto 12px;
        }

        .lead {
            color: #6b8cae;
            margin-bottom: 16px;
            text-align: center;
        }

        .form-group { margin-bottom: 12px }
        .form-group label { display:block; margin-bottom:6px; font-weight:600 }
        .form-group input { width:100%; padding:10px; border:1px solid #d1d5db; border-radius:6px }
        .btn-primary { width:100%; padding:10px; background:#0d6efd; color:#fff; border:none; border-radius:6px; cursor:pointer }
        .helper-row { margin-top:12px; display:flex; justify-content:space-between; align-items:center }
        .signup-link { color:#0d6efd; text-decoration:none }
    </style>
</head>

<body>
  <div class="shell">
    <div class="sidebar">
      <div class="logo-lockup">
        <div class="logo-icon"></div>
        <div>
          <div style="font-weight:700">ConnectZw</div>
          <div style="margin-top:8px;font-size:14px;color:#c9e2d8">Delivering value, one coupon at a time</div>
        </div>
      </div>
    </div>
    <div class="login-card">
      <img src="{% static 'images/icon.png' %}" alt="logo" class="login-logo">
      <h1 style="text-align:center">Welcome to ConnectZw</h1>
      <p class="lead">Please enter your credentials to login</p>

      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="{{ message.tags }}" style="color:#c0392b;margin-bottom:8px">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" name="username" id="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" name="password" id="password" required>
        </div>
        <button type="submit" class="btn-primary">Login</button>
      </form>

      <div class="helper-row">
        <div style="font-size:13px;color:#6b8cae">Don't have an account?</div>
        <a href="{% url 'client_signup' %}" class="signup-link">Sign Up as Client</a>
      </div>
    </div>
  </div>
</body>

</html>
